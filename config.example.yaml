# Example configuration / 示例配置
# Copy this file to config.yaml and replace the placeholder upstreams and keys.
# 复制本文件为 config.yaml，然后替换其中的上游地址与密钥引用。

# Local listen address / 本地监听地址
listen:
  host: 127.0.0.1
  port: 9000

# Retry policy / 重试策略
retry_policy:
  retryable_status_codes:
    - 429
    - 500
    - 502
    - 503
    - 504
  # Statuses counted as provider failures without same-provider retry.
  # 不触发同 Provider 重试，但会累计 Provider 失败并可能触发冷却的状态码。
  provider_failure_status_codes:
    - 401
    - 403
  same_provider_retry_count: 0
  retry_interval_ms: 0

# Manual healthcheck settings / 手动健康检查设置
healthcheck:
  # When true, manual health checks use stream=true and only succeed after the first chunk arrives.
  # 为 true 时，手动健康检查会使用 stream=true，并在收到首个 chunk 后才判定成功。
  stream: false

# Responses WebSocket settings / Responses WebSocket 设置
responses_websocket:
  # Disabled by default. Enable this only when you want the proxy to accept
  # northbound /v1/responses websocket connections.
  # 默认关闭。只有当你明确希望代理接受北向 /v1/responses websocket 连接时才开启。
  enabled: false

# Upstream providers / 上游 Provider 列表
providers:
  # Explicit model provider / 显式模型 Provider
  - name: relay_a
    base_url: https://relay-a.example.com/v1
    api_key: env:RELAY_A_API_KEY
    enabled: true
    priority: 10
    models:
      - gpt-4.1
      - gpt-4o-mini
    # Set to true only if this upstream supports the Responses WebSocket transport.
    # 仅当该上游支持 Responses WebSocket 传输时才设为 true。
    supports_responses_websocket: false
    timeout_seconds: 60
    max_failures: 3
    cooldown_seconds: 30

  # Wildcard model provider / 通配模型 Provider
  # Lower priority means it is tried later than relay_a.
  # priority 数值更大，所以它会排在 relay_a 后面尝试。
  - name: relay_b
    base_url: https://relay-b.example.com/v1
    api_key: env:RELAY_B_API_KEY
    enabled: true
    priority: 20
    models:
      - "*"
    # Required for wildcard providers if you want manual health checks.
    # 如果是通配模型 Provider，想启用手动健康检查就必须设置此项。
    healthcheck_model: gpt-4o-mini
    # Set to true only if this upstream supports the Responses WebSocket transport.
    # 仅当该上游支持 Responses WebSocket 传输时才设为 true。
    supports_responses_websocket: false
    timeout_seconds: 60
    max_failures: 3
    cooldown_seconds: 30
