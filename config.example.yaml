listen:
  host: 127.0.0.1
  port: 9000

providers:
  - name: relay_a
    base_url: https://relay-a.example.com/v1
    api_key: env:RELAY_A_API_KEY
    enabled: true
    priority: 10
    models:
      - gpt-4.1
      - gpt-4o-mini
    timeout_seconds: 60
    max_failures: 3
    cooldown_seconds: 30

  - name: relay_b
    base_url: https://relay-b.example.com/v1
    api_key: env:RELAY_B_API_KEY
    enabled: true
    priority: 20
    models:
      - "*"
    healthcheck_model: gpt-4o-mini
    timeout_seconds: 60
    max_failures: 3
    cooldown_seconds: 30
